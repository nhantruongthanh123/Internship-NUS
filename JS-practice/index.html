<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        .calculator {
            width: 150px;
            margin: 50px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background: cyan;
            border: 3px solid #800000;
            border-radius: 5px;
        }

        .display {
            height: 40px;
            background: #f0f0f0;
            margin-bottom:10px;
            border: 3px solid #800000;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 6px;
        }

        .rows {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .rows button {
            height: 30px;
            width: 30px;
            background: #FFCC99;
            color: #0000FF;
            border: 3px solid #800000;
            border-radius: 5px;
        }

        .rows button:hover {
            background: #FFCC00;
            color: #0000FF;
        }

        .rows button:active {
            background: #ff9900;
            color: #0000FF;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display"></div>
        
        <div class="keys">
            <div class="rows">
                <button >7</button>
                <button >8</button>
                <button >9</button>
                <button >/</button>
            </div>
            <div class="rows">
                <button >4</button>
                <button >5</button>
                <button >6</button>
                <button >*</button>
            </div>
            <div class="rows">
                <button >1</button>
                <button >2</button>
                <button >3</button>
                <button >-</button>
            </div>
            <div class="rows">
                <button >0</button>
                <button >.</button>
                <button >=</button>
                <button >+</button>
            </div>
        </div>
    </div>

    <script src="app.js"> </script>
</body>
</html>
